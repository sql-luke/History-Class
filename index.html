<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歷史全自動博物館｜數位特稿館</title>
    <!-- 載入必要套件 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --paper: #fcfaf7;
            --ink: #1a1c1e;
            --accent: #4f46e5;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--paper);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }
        
        .font-serif { font-family: 'Noto Serif TC', serif; }

        /* --- Markdown 渲染樣式優化 --- */
        .markdown-body {
            line-height: 2;
            font-size: 1.15rem;
            color: #334155;
            text-align: justify;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            font-family: 'Noto Serif TC', serif;
            color: #0f172a;
            margin-top: 2.5rem;
            margin-bottom: 1.25rem;
            font-weight: 900;
        }
        .markdown-body h2 { font-size: 2rem; border-bottom: 3px solid #e2e8f0; padding-bottom: 0.5rem; }
        .markdown-body h3 { font-size: 1.5rem; color: var(--accent); }
        
        .markdown-body p { margin-bottom: 1.5rem; }
        
        .markdown-body blockquote {
            border-left: 5px solid var(--accent);
            padding: 1rem 1.5rem;
            background: #f8fafc;
            font-style: italic;
            border-radius: 0 1rem 1rem 0;
            margin: 2rem 0;
            color: #475569;
        }

        .markdown-body ul, .markdown-body ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
            list-style-type: disc;
        }

        /* 表格樣式修正 */
        .markdown-body table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 2.5rem 0;
            background: #fff;
            border-radius: 1.25rem;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
            border: 1px solid #e2e8f0;
        }
        .markdown-body th { background: #f8fafc; padding: 1rem; text-align: left; font-weight: 900; color: #1e293b; border-bottom: 2px solid #e2e8f0; }
        .markdown-body td { padding: 1rem; border-bottom: 1px solid #f1f5f9; }
        .markdown-body tr:last-child td { border-bottom: none; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* 動畫 */
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyYNPgAMmqciydGXzwMkWlQ57NUNDSgnCPbhvykYN_CiP61iF3zSxyWrcJed_vYdvAknQ/exec";

        const Icon = ({ name, size = 20, className = "" }) => (
            <i className={`lucide-${name} ${className}`} style={{ fontSize: size }}></i>
        );

        const App = () => {
            const [lessons, setLessons] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selected, setSelected] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                fetch(GAS_API_URL)
                    .then(res => res.json())
                    .then(data => {
                        setLessons(data);
                        if (data.length > 0) setSelected(data[data.length - 1]);
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);

            const filtered = lessons.filter(l => 
                (l.topic?.toLowerCase() || "").includes(searchTerm.toLowerCase()) || 
                (l.era?.toLowerCase() || "").includes(searchTerm.toLowerCase())
            );

            // 使用 marked 處理 Markdown 內容
            const getHtmlContent = (content) => {
                if (!content) return "";
                // 移除 JSON 與 YAML 區塊
                let cleanBody = content.replace(/```json[\s\S]*?```/g, "");
                // 如果有 --- 分隔符，通常正文在最後一個 --- 之後
                const parts = cleanBody.split('---');
                const rawMarkdown = parts.length >= 3 ? parts.slice(2).join('---').trim() : cleanBody.trim();
                return marked.parse(rawMarkdown);
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center space-y-6 bg-white">
                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-xs font-black tracking-[0.3em] text-slate-400 uppercase">Synchronizing History...</p>
                </div>
            );

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* 左側：精緻選單 */}
                    <aside className="w-96 bg-white border-r border-slate-200 flex flex-col z-20 shadow-xl">
                        <div className="p-8 pb-4">
                            <div className="flex items-center gap-4 mb-8">
                                <div className="p-3 bg-slate-900 rounded-2xl text-white shadow-2xl">
                                    <Icon name="history" size={24} />
                                </div>
                                <div>
                                    <h1 className="text-xl font-black tracking-tighter">歷史博物館</h1>
                                    <p className="text-[10px] text-indigo-600 font-black uppercase tracking-widest">Digital Archives</p>
                                </div>
                            </div>
                            <div className="relative">
                                <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input 
                                    className="w-full pl-12 pr-4 py-3 bg-slate-100 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-slate-900 transition-all border-none"
                                    placeholder="搜尋朝代、主題或人物..."
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-6 space-y-4 custom-scroll">
                            {filtered.map((item, idx) => (
                                <button
                                    key={item.fileName || idx}
                                    onClick={() => setSelected(item)}
                                    className={`w-full text-left p-6 rounded-[2rem] transition-all duration-300 group ${
                                        selected?.fileName === item.fileName 
                                        ? 'bg-slate-900 text-white shadow-2xl -translate-y-1' 
                                        : 'hover:bg-slate-50 text-slate-500'
                                    }`}
                                >
                                    <div className={`text-[10px] font-black tracking-[0.2em] uppercase mb-2 ${selected?.fileName === item.fileName ? 'text-indigo-400' : 'text-indigo-600'}`}>
                                        {item.era}
                                    </div>
                                    <h3 className="font-bold text-base leading-snug font-serif">{item.topic}</h3>
                                </button>
                            ))}
                        </div>
                    </aside>

                    {/* 右側：特稿顯示區 */}
                    <main className="flex-1 overflow-y-auto bg-[#fcfaf7] custom-scroll">
                        {selected ? (
                            <div className="max-w-4xl mx-auto py-24 px-12 fade-in" key={selected.fileName}>
                                {/* 文章頭部 */}
                                <div className="mb-16">
                                    <div className="flex items-center gap-3 text-indigo-600 font-black text-xs tracking-[0.3em] mb-6 uppercase">
                                        <Icon name="map-pin" size={14} /> {selected.era}
                                    </div>
                                    <h2 className="text-6xl font-black text-slate-900 mb-10 leading-[1.1] font-serif tracking-tight">
                                        {selected.topic}
                                    </h2>
                                    
                                    {/* 人物標籤 */}
                                    {selected.characters && selected.characters.length > 0 && (
                                        <div className="flex flex-wrap gap-3">
                                            {selected.characters.map(c => (
                                                <span key={c} className="px-4 py-1.5 bg-white border border-slate-200 rounded-full text-[11px] font-black text-slate-500 shadow-sm flex items-center gap-2 uppercase tracking-wider">
                                                    <span className="w-1.5 h-1.5 bg-indigo-500 rounded-full"></span>
                                                    {c}
                                                </span>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {/* 正文內容 (透過 dangerouslySetInnerHTML 渲染) */}
                                <div 
                                    className="markdown-body font-serif"
                                    dangerouslySetInnerHTML={{ __html: getHtmlContent(selected.fullContent) }}
                                />

                                <footer className="mt-32 pt-12 border-t border-slate-200 flex justify-between items-center text-slate-300 text-[10px] font-black tracking-[0.4em] uppercase">
                                    <span>Chronicle Automation System v2.0</span>
                                    <span>Update: 2026-03-10</span>
                                </footer>
                            </div>
                        ) : (
                            <div className="h-full flex flex-col items-center justify-center text-slate-200">
                                <Icon name="book-open" size={80} className="mb-6 opacity-10" />
                                <p className="font-black tracking-widest text-sm uppercase opacity-30">Select an archive</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
