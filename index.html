<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歷史全自動博物館｜數位特稿館</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --paper: #fcfaf7;
            --ink: #1a1c1e;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--paper);
            color: var(--ink);
        }
        
        .font-serif { font-family: 'Noto Serif TC', serif; }
        
        .feature-content h1, .feature-content h2, .feature-content h3 {
            font-family: 'Noto Serif TC', serif;
            color: #1a1c1e;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        .feature-content h2 { 
            font-size: 1.875rem; 
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }

        .feature-content p {
            line-height: 2;
            margin-bottom: 1.5rem;
            font-size: 1.125rem;
            text-align: justify;
        }

        .feature-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        .feature-content th { background: #f8fafc; padding: 12px; text-align: left; font-weight: 900; }
        .feature-content td { padding: 12px; border-top: 1px solid #f1f5f9; }

        .glass-nav {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.8);
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyYNPgAMmqciydGXzwMkWlQ57NUNDSgnCPbhvykYN_CiP61iF3zSxyWrcJed_vYdvAknQ/exec";

        const Icon = ({ name, size = 20, className = "" }) => (
            <i className={`lucide-${name} ${className}`} style={{ fontSize: size }}></i>
        );

        const App = () => {
            const [lessons, setLessons] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selected, setSelected] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                fetch(GAS_API_URL)
                    .then(res => res.json())
                    .then(data => {
                        setLessons(data);
                        if (data.length > 0) setSelected(data[data.length - 1]);
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);

            const filtered = lessons.filter(l => 
                l.topic?.includes(searchTerm) || l.era?.includes(searchTerm)
            );

            const renderArticle = (content) => {
                if (!content) return null;
                // 移除 JSON 與 YAML，轉換 Markdown 的簡單呈現
                let body = content.replace(/```json[\s\S]*?```/g, "").split('---');
                return body.length >= 3 ? body.slice(2).join('---').trim() : body[0].trim();
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center space-y-4">
                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-sm font-bold tracking-widest text-slate-400">正在鋪設歷史長廊...</p>
                </div>
            );

            return (
                <div className="flex h-screen">
                    {/* 左側：精緻列表 */}
                    <aside className="w-96 bg-white border-r border-slate-200 flex flex-col z-20 shadow-2xl">
                        <div className="p-8 border-b border-slate-100">
                            <div className="flex items-center gap-3 mb-8">
                                <div className="p-3 bg-slate-900 rounded-2xl text-white shadow-xl">
                                    <Icon name="history" size={24} />
                                </div>
                                <div>
                                    <h1 className="text-xl font-black tracking-tighter">歷史博物館</h1>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Automation Archive</p>
                                </div>
                            </div>
                            <div className="relative">
                                <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input 
                                    className="w-full pl-12 pr-4 py-3 bg-slate-50 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-slate-900 transition-all"
                                    placeholder="搜尋朝代或事件..."
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-6 space-y-4 custom-scroll">
                            {filtered.map((item, idx) => (
                                <button
                                    key={item.fileName || idx}
                                    onClick={() => setSelected(item)}
                                    className={`w-full text-left p-6 rounded-[2rem] transition-all group ${
                                        selected?.fileName === item.fileName 
                                        ? 'bg-slate-900 text-white shadow-2xl -translate-y-1' 
                                        : 'hover:bg-slate-100 text-slate-500'
                                    }`}
                                >
                                    <div className={`text-[10px] font-black tracking-[0.2em] uppercase mb-2 ${selected?.fileName === item.fileName ? 'text-indigo-400' : 'text-indigo-600'}`}>
                                        {item.era}
                                    </div>
                                    <h3 className="font-bold text-base leading-tight font-serif">{item.topic}</h3>
                                </button>
                            ))}
                        </div>
                    </aside>

                    {/* 右側：特稿顯示區 */}
                    <main className="flex-1 overflow-y-auto bg-[#fcfaf7] selection:bg-indigo-100 selection:text-indigo-900 custom-scroll">
                        {selected ? (
                            <div className="max-w-4xl mx-auto py-24 px-12">
                                {/* 文章前導 */}
                                <div className="mb-12">
                                    <div className="flex items-center gap-3 text-indigo-600 font-black text-xs tracking-widest mb-6 uppercase">
                                        <Icon name="bookmark" size={14} /> {selected.era}
                                    </div>
                                    <h2 className="text-6xl font-black text-slate-900 mb-10 leading-[1.1] font-serif tracking-tight">
                                        {selected.topic}
                                    </h2>
                                    
                                    {/* 快速人物卡片 */}
                                    {selected.characters && selected.characters.length > 0 && (
                                        <div className="flex flex-wrap gap-3 mb-12">
                                            {selected.characters.map(c => (
                                                <div key={c} className="px-4 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold text-slate-600 shadow-sm flex items-center gap-2">
                                                    <div className="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></div>
                                                    {c}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {/* 正文內容區 */}
                                <div className="feature-content font-serif leading-loose">
                                    <div className="whitespace-pre-wrap">
                                        {renderArticle(selected.fullContent)}
                                    </div>
                                </div>

                                <footer className="mt-32 pt-12 border-t border-slate-200 flex justify-between items-center text-slate-300 text-[10px] font-bold tracking-[0.4em] uppercase">
                                    <span>Digital History Feature</span>
                                    <span>Sync: 2026-03-10</span>
                                </footer>
                            </div>
                        ) : (
                            <div className="h-full flex flex-col items-center justify-center text-slate-200">
                                <Icon name="book-open" size={80} className="mb-6 opacity-20" />
                                <p className="font-black tracking-widest text-sm uppercase">Curating History...</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
