<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全自動歷史博物館</title>
    <!-- 載入必要套件 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        .font-serif { font-family: 'Noto Serif TC', serif; }
        /* 自定義捲軸樣式 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 您的 Google Apps Script API 網址
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyYNPgAMmqciydGXzwMkWlQ57NUNDSgnCPbhvykYN_CiP61iF3zSxyWrcJed_vYdvAknQ/exec";

        // 圖標元件
        const Icon = ({ name, size = 20, className = "" }) => (
            <i className={`lucide-${name} ${className}`} style={{ fontSize: size }}></i>
        );

        const App = () => {
            const [lessons, setLessons] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedLesson, setSelectedLesson] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [showAnswer, setShowAnswer] = useState(false);

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const res = await fetch(GAS_API_URL);
                        const data = await res.json();
                        setLessons(data);
                        if (data.length > 0) setSelectedLesson(data[data.length - 1]);
                    } catch (err) {
                        console.error("資料獲取失敗:", err);
                    } finally {
                        setLoading(false);
                    }
                };
                loadData();
            }, []);

            const filtered = lessons.filter(l => 
                l.topic?.toLowerCase().includes(searchTerm.toLowerCase()) || 
                l.era?.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const renderMarkdown = (content) => {
                if (!content) return "內容讀取中...";
                // 移除 JSON 代碼塊與 YAML 標頭
                const clean = content.replace(/```json[\s\S]*?```/g, "").split('---');
                return clean.length >= 3 ? clean.slice(2).join('---').trim() : clean[0].trim();
            };

            if (loading) {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center bg-white">
                        <div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-6"></div>
                        <p className="text-sm font-bold tracking-widest text-slate-400 uppercase">Museum Syncing...</p>
                    </div>
                );
            }

            return (
                <div className="flex h-screen w-screen overflow-hidden">
                    {/* 左側選單 */}
                    <aside className="w-80 bg-white border-r border-slate-200 flex flex-col z-10 shadow-sm">
                        <div className="p-8 pb-6">
                            <div className="flex items-center gap-3 mb-8">
                                <div className="p-2.5 bg-indigo-600 rounded-2xl text-white shadow-lg shadow-indigo-100">
                                    <Icon name="history" size={24} />
                                </div>
                                <h1 className="text-xl font-black tracking-tighter">歷史全自動館</h1>
                            </div>
                            <div className="relative">
                                <Icon name="search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input 
                                    className="w-full pl-10 pr-4 py-3 bg-slate-100 rounded-2xl text-sm border-none focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                    placeholder="搜尋人物、戰役、朝代..."
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto px-4 pb-8 space-y-3">
                            {filtered.length > 0 ? filtered.map((lesson, idx) => (
                                <button
                                    key={lesson.lesson_order || idx}
                                    onClick={() => { setSelectedLesson(lesson); setShowAnswer(false); }}
                                    className={`w-full text-left p-5 rounded-3xl transition-all duration-300 ${
                                        selectedLesson?.lesson_order === lesson.lesson_order 
                                        ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-200 -translate-y-1' 
                                        : 'hover:bg-slate-50 text-slate-500'
                                    }`}
                                >
                                    <div className={`text-[10px] font-black uppercase tracking-widest mb-1 ${selectedLesson?.lesson_order === lesson.lesson_order ? 'text-indigo-200' : 'text-indigo-500'}`}>
                                        Day {lesson.lesson_order}
                                    </div>
                                    <h3 className="font-bold text-sm leading-snug mb-2">{lesson.topic}</h3>
                                    <div className={`text-[10px] inline-block px-2 py-0.5 rounded-lg ${selectedLesson?.lesson_order === lesson.lesson_order ? 'bg-indigo-500 text-white' : 'bg-slate-200 text-slate-400'}`}>
                                        {lesson.era}
                                    </div>
                                </button>
                            )) : (
                                <div className="text-center py-12 text-slate-300 text-xs italic">無相符結果</div>
                            )}
                        </div>
                    </aside>

                    {/* 右側內容 */}
                    <main className="flex-1 overflow-y-auto bg-slate-50 scroll-smooth">
                        {selectedLesson ? (
                            <div className="max-w-4xl mx-auto py-20 px-12">
                                <div className="flex items-center gap-2 text-indigo-600 font-black text-xs tracking-widest mb-4 uppercase">
                                    <Icon name="calendar-days" size={14} /> {selectedLesson.era}
                                </div>
                                <h2 className="text-6xl font-black text-slate-900 mb-12 leading-[1.1] tracking-tight font-serif">
                                    {selectedLesson.topic}
                                </h2>

                                <article className="bg-white p-14 rounded-[3rem] shadow-sm border border-slate-200/50 leading-relaxed font-serif text-xl text-slate-700 mb-12 shadow-indigo-100/20">
                                    <div className="whitespace-pre-wrap">
                                        {renderMarkdown(selectedLesson.fullContent)}
                                    </div>
                                </article>

                                <section className="bg-slate-900 text-white p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden group">
                                    <div className="absolute top-0 right-0 p-12 opacity-5 group-hover:opacity-10 transition-opacity">
                                        <Icon name="brain-circuit" size={120} />
                                    </div>
                                    <div className="relative z-10">
                                        <h3 className="flex items-center gap-3 font-black text-xl mb-4 text-indigo-400 uppercase tracking-tighter">
                                            <Icon name="help-circle" /> 課後思維啟發
                                        </h3>
                                        <p className="text-slate-400 text-sm mb-8 leading-relaxed max-w-md">
                                            歷史不只是過去，更是未來的引路燈。點擊下方按鈕獲取本篇課程的深層解析。
                                        </p>
                                        <button 
                                            onClick={() => setShowAnswer(!showAnswer)} 
                                            className="px-10 py-4 bg-indigo-600 hover:bg-indigo-500 transition-all rounded-2xl text-sm font-black shadow-lg shadow-indigo-500/30 active:scale-95"
                                        >
                                            {showAnswer ? '隱藏解析內容' : '解鎖今日答案'}
                                        </button>
                                        {showAnswer && (
                                            <div className="mt-8 p-6 bg-slate-800/50 backdrop-blur-sm rounded-2xl text-indigo-200 text-sm border border-slate-700 animate-in fade-in slide-in-from-top-4 duration-500">
                                                <div className="flex items-center gap-2 mb-2 font-bold text-indigo-400 underline underline-offset-4">
                                                    官方解析：
                                                </div>
                                                詳細答案已收錄在您的雲端資料庫（Markdown 檔案末端），請查閱原始文件獲取最完整的專家解析。
                                            </div>
                                        )}
                                    </div>
                                </section>

                                <footer className="mt-24 pt-8 border-t border-slate-200 flex justify-between items-center text-slate-300 text-[10px] font-bold tracking-[0.3em] uppercase">
                                    <span>Global History Automation System</span>
                                    <span>Sync: {new Date().toLocaleDateString()}</span>
                                </footer>
                            </div>
                        ) : (
                            <div className="h-full flex flex-col items-center justify-center text-slate-200">
                                <Icon name="book-marked" size={80} className="mb-6 opacity-20" />
                                <p className="font-black tracking-widest text-sm uppercase">Select a lesson to begin</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
